name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}

# ── Shared anchors ──────────────────────────────────────────────────────────

x-api-common: &api-common
  restart: unless-stopped
  # Redis and MySQL are external on the shared network.
  # No depends_on needed — containers will retry connections.
  networks:
    - traefik_internal
    - shared
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 100M

x-api-verixa-common: &api-verixa-common
  <<: *api-common
  env_file:
    - ${VERIXA_APP_ENV_FILE:-/dev/null}
  expose:
    - "${VERIXA_PORT:-8900}"
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${VERIXA_PORT:-8900}/readyz >/dev/null 2>&1"]
    interval: 10s
    timeout: 3s
    retries: 6
    start_period: 20s
  environment: &api-verixa-env
    APP_PORT: ${VERIXA_PORT:-8900}
    SCHEDULER_ENABLED: "false"
  labels:
    promtail.labels.service_type: go
    promtail.labels.service_name: webhook

x-api-lgpay-common: &api-lgpay-common
  <<: *api-common
  env_file:
    - ${LGPAY_APP_ENV_FILE:-/dev/null}
  expose:
    - "${LGPAY_PORT:-8902}"
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${LGPAY_PORT:-8902}/readyz >/dev/null 2>&1"]
    interval: 10s
    timeout: 3s
    retries: 6
    start_period: 20s
  environment: &api-lgpay-env
    APP_PORT: ${LGPAY_PORT:-8902}
    SCHEDULER_ENABLED: "false"
  labels:
    promtail.labels.service_type: go
    promtail.labels.service_name: webhook

x-api-sandbox-common: &api-sandbox-common
  <<: *api-common
  env_file:
    - ${SANDBOX_APP_ENV_FILE:-/dev/null}
  expose:
    - "${SANDBOX_PORT:-8904}"
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${SANDBOX_PORT:-8904}/readyz >/dev/null 2>&1"]
    interval: 10s
    timeout: 3s
    retries: 6
    start_period: 20s
  environment: &api-sandbox-env
    APP_PORT: ${SANDBOX_PORT:-8904}
    SCHEDULER_ENABLED: "false"
  labels:
    promtail.labels.service_type: go
    promtail.labels.service_name: webhook

# ── Services ────────────────────────────────────────────────────────────────

services:
  traefik:
    image: traefik:v3.1
    container_name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}-traefik
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "${VERIXA_TRAEFIK_PORT:-8900}:8900"
      - "${LGPAY_TRAEFIK_PORT:-8902}:8902"
      - "${SANDBOX_TRAEFIK_PORT:-8904}:8904"
      - "${TRAEFIK_DASHBOARD_PORT:-8999}:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - traefik_internal
      - shared
    depends_on:
      - api-verixa-blue
      - api-verixa-green
      - api-lgpay-blue
      - api-lgpay-green
      - api-sandbox-blue
      - api-sandbox-green

  # ── Verixa blue/green ─────────────────────────────────────────────────────

  api-verixa-blue:
    <<: *api-verixa-common
    container_name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}-api-verixa-blue
    image: ${SERVICE_WEBHOOK_IMAGE:-service-webhook}:${SERVICE_WEBHOOK_VERSION:-latest}
    environment:
      <<: *api-verixa-env
      DEPLOY_COLOR: blue

  api-verixa-green:
    <<: *api-verixa-common
    container_name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}-api-verixa-green
    image: ${SERVICE_WEBHOOK_IMAGE:-service-webhook}:${SERVICE_WEBHOOK_VERSION:-latest}
    environment:
      <<: *api-verixa-env
      DEPLOY_COLOR: green

  # ── Lgpay blue/green ──────────────────────────────────────────────────────

  api-lgpay-blue:
    <<: *api-lgpay-common
    container_name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}-api-lgpay-blue
    image: ${SERVICE_WEBHOOK_IMAGE:-service-webhook}:${SERVICE_WEBHOOK_VERSION:-latest}
    environment:
      <<: *api-lgpay-env
      DEPLOY_COLOR: blue

  api-lgpay-green:
    <<: *api-lgpay-common
    container_name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}-api-lgpay-green
    image: ${SERVICE_WEBHOOK_IMAGE:-service-webhook}:${SERVICE_WEBHOOK_VERSION:-latest}
    environment:
      <<: *api-lgpay-env
      DEPLOY_COLOR: green

  # ── Sandbox blue/green ────────────────────────────────────────────────────

  api-sandbox-blue:
    <<: *api-sandbox-common
    container_name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}-api-sandbox-blue
    image: ${SERVICE_WEBHOOK_IMAGE:-service-webhook}:${SERVICE_WEBHOOK_VERSION:-latest}
    environment:
      <<: *api-sandbox-env
      DEPLOY_COLOR: blue

  api-sandbox-green:
    <<: *api-sandbox-common
    container_name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}-api-sandbox-green
    image: ${SERVICE_WEBHOOK_IMAGE:-service-webhook}:${SERVICE_WEBHOOK_VERSION:-latest}
    environment:
      <<: *api-sandbox-env
      DEPLOY_COLOR: green

# ── Networks ────────────────────────────────────────────────────────────────

networks:
  traefik_internal:
    internal: true
  shared:
    name: ${SHARED_NETWORK_NAME:-shared_net}
    external: true
