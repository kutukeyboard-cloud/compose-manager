name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}

x-service-webhook-common: &service-webhook-common
  restart: unless-stopped
  expose:
    - "${APP_PORT:-8080}"
  environment: &service-webhook-env
    APP_ENV: ${APP_ENV:-production}
    APP_NAME: ${APP_NAME:-Verixa}
    APP_PORT: ${APP_PORT:-8080}
    DB_HOST: ${DB_HOST:-mysql}
    DB_PORT: ${DB_PORT:-3306}
    DB_USER: ${DB_USER:-root}
    DB_PASS: ${DB_PASS:-}
    DB_NAME: ${DB_NAME:-service_webhook}
    DB_CHARSET: ${DB_CHARSET:-utf8mb4}
    REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
    REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    REDIS_DB: ${REDIS_DB:-0}
    LOG_LEVEL: ${LOG_LEVEL:-1}
    REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-15}
    INTERNAL_TRANSFER_BASE_URL: ${INTERNAL_TRANSFER_BASE_URL:-http://verixa-org-web:8000}
    INTERNAL_TRANSFER_PATH: ${INTERNAL_TRANSFER_PATH:-/api/v1/internal-transfer}
    SETTLEMENT_T0_INTERVAL: ${SETTLEMENT_T0_INTERVAL:-10m}
    SETTLEMENT_T1_CRON_TIME: ${SETTLEMENT_T1_CRON_TIME:-16:00}
    SETTLEMENT_CUTOFF_TIME: ${SETTLEMENT_CUTOFF_TIME:-23:30}
    SETTLEMENT_LOCK_TTL_SECONDS: ${SETTLEMENT_LOCK_TTL_SECONDS:-300}
    SETTLEMENT_MAX_RETRIES: ${SETTLEMENT_MAX_RETRIES:-3}
    SETTLEMENT_PER_CHANNEL_ENABLED: ${SETTLEMENT_PER_CHANNEL_ENABLED:-true}
    TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
    CRON_TZ: ${CRON_TZ:-Asia/Shanghai}
    PAYOUT_DEBUG_FULL_LOG: ${PAYOUT_DEBUG_FULL_LOG:-true}
    CACHE_INVALIDATION_ENABLED: ${CACHE_INVALIDATION_ENABLED:-true}
  networks:
    - traefik_internal
    - shared
  labels:
    promtail.labels.service_type: go
    promtail.labels.service_name: service-webhook
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${APP_PORT:-8080}/readyz >/dev/null 2>&1"]
    interval: 10s
    timeout: 3s
    retries: 6
    start_period: 20s

services:
  traefik:
    image: traefik:v3.1
    container_name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}-traefik
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - traefik_internal
      - shared
    depends_on:
      - service-webhook-blue
      - service-webhook-green

  service-webhook-blue:
    <<: *service-webhook-common
    container_name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}-service-webhook-blue
    image: ${SERVICE_WEBHOOK_IMAGE:-service-webhook}:${SERVICE_WEBHOOK_VERSION:-latest}
    env_file:
      - ./env/blue.env
    environment:
      <<: *service-webhook-env
      DEPLOY_COLOR: blue

  service-webhook-green:
    <<: *service-webhook-common
    container_name: ${COMPOSE_PROJECT_NAME:-service-webhook-bg}-service-webhook-green
    image: ${SERVICE_WEBHOOK_IMAGE:-service-webhook}:${SERVICE_WEBHOOK_VERSION:-latest}
    env_file:
      - ./env/green.env
    environment:
      <<: *service-webhook-env
      DEPLOY_COLOR: green

networks:
  traefik_internal:
    internal: true
  shared:
    name: ${SHARED_NETWORK_NAME:-shared}
    external: true
